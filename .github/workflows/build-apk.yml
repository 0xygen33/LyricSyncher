name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Generate Android project files
        run: |
          mkdir -p app/src/main/java/com/lyricsyncher/app app/src/main/res/values app/src/main/res/drawable app/src/main/res/mipmap-anydpi-v26 app/src/main/assets

          cat <<'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "LyricSyncher"
          include(":app")
          EOF

          cat <<'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat <<'EOF' > gradle.properties
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

          cat <<'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.lyricsyncher.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.lyricsyncher.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = "1.8"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-ktx:1.9.0")
              // WebViewAssetLoader - serves the local HTML from a secure virtual origin
              // so navigator.clipboard.writeText() works, matching the live site.
              implementation("androidx.webkit:webkit:1.12.0")
          }
          EOF

          cat <<'EOF' > app/proguard-rules.pro
          # Add project-specific ProGuard rules here.
          # This app has no reflection-heavy libraries or WebView JS interfaces that need keep rules.
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <!-- Intentionally no <uses-permission android:name="android.permission.INTERNET"/>.
                   The app cannot reach the network even if it wanted to - fully offline by construction. -->

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.LyricSyncher"
                  android:hardwareAccelerated="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>

          </manifest>
          EOF

          cat <<'EOF' > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Pulled directly from the :root CSS variables in index.html -->
              <color name="bg_color">#0B0B0E</color>
              <color name="container_bg">#16161A</color>
              <color name="accent_color">#30DAC5</color>
              <color name="error_color">#FF5C5C</color>
              <color name="text_color">#FFFFFF</color>
              <color name="text_muted">#94A3B8</color>

              <color name="ic_launcher_background">#0B0B0E</color>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">LyricSyncher</string>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LyricSyncher" parent="android:Theme.Material.NoActionBar">
                  <item name="android:windowBackground">@color/bg_color</item>
                  <item name="android:statusBarColor">@color/bg_color</item>
                  <item name="android:navigationBarColor">@color/bg_color</item>
                  <item name="android:colorPrimary">@color/accent_color</item>
                  <item name="android:colorAccent">@color/accent_color</item>
              </style>
          </resources>
          EOF

          cat <<'EOF' > app/src/main/res/drawable/ic_launcher_foreground.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#30DAC5"
                  android:pathData="M34,39 L44,39 L44,69 L34,69 Z" />
              <path
                  android:fillColor="#30DAC5"
                  android:pathData="M49,31 L59,31 L59,77 L49,77 Z" />
              <path
                  android:fillColor="#30DAC5"
                  android:pathData="M64,43 L74,43 L74,65 L64,65 Z" />
          </vector>
          EOF

          cat <<'EOF' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background" />
              <foreground android:drawable="@drawable/ic_launcher_foreground" />
          </adaptive-icon>
          EOF

          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          cat <<'EOF' > app/src/main/java/com/lyricsyncher/app/MainActivity.kt
          package com.lyricsyncher.app

          import android.net.Uri
          import android.os.Bundle
          import android.view.KeyEvent
          import android.webkit.ValueCallback
          import android.webkit.WebChromeClient
          import android.webkit.WebResourceRequest
          import android.webkit.WebResourceResponse
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import androidx.activity.ComponentActivity
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.webkit.WebViewAssetLoader

          /**
           * Wraps the original LyricSyncher web app (app/src/main/assets/index.html) unchanged.
           *
           * The HTML/CSS/JS is served from a virtual https://appassets.androidplatform.net origin
           * via WebViewAssetLoader instead of a raw file:// URL. This matters for two things the
           * original site relies on:
           *   1. navigator.clipboard.writeText() (the Copy button) only works in a "secure context" -
           *      file:// doesn't count as one, https-style virtual origins do.
           *   2. <input type="file"> needs an explicit file-chooser hookup below, or tapping it does
           *      nothing in a WebView.
           *
           * No android.permission.INTERNET is declared anywhere in this project, so the app has no
           * way to reach the network even if something tried - it is genuinely offline.
           */
          class MainActivity : ComponentActivity() {

              private lateinit var webView: WebView
              private var fileChooserCallback: ValueCallback<Array<Uri>>? = null

              private val filePicker =
                  registerForActivityResult(ActivityResultContracts.GetContent()) { uri: Uri? ->
                      fileChooserCallback?.onReceiveValue(if (uri != null) arrayOf(uri) else null)
                      fileChooserCallback = null
                  }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)

                  val assetLoader = WebViewAssetLoader.Builder()
                      .addPathHandler("/assets/", WebViewAssetLoader.AssetsPathHandler(this))
                      .build()

                  webView = WebView(this).apply {
                      settings.javaScriptEnabled = true
                      settings.domStorageEnabled = true
                      settings.allowFileAccess = false
                      settings.allowContentAccess = false
                      settings.mediaPlaybackRequiresUserGesture = false

                      webViewClient = object : WebViewClient() {
                          override fun shouldInterceptRequest(
                              view: WebView,
                              request: WebResourceRequest
                          ): WebResourceResponse? = assetLoader.shouldInterceptRequest(request.url)
                      }

                      webChromeClient = object : WebChromeClient() {
                          override fun onShowFileChooser(
                              view: WebView,
                              filePathCallback: ValueCallback<Array<Uri>>,
                              fileChooserParams: FileChooserParams
                          ): Boolean {
                              fileChooserCallback = filePathCallback
                              filePicker.launch("audio/*")
                              return true
                          }
                      }

                      loadUrl("https://appassets.androidplatform.net/assets/index.html")
                  }

                  setContentView(webView)
              }

              // Lets the Android back button step back through in-page history instead of
              // instantly closing the app - matches how you'd expect a browser tab to behave.
              override fun onKeyDown(keyCode: Int, event: KeyEvent?): Boolean {
                  if (keyCode == KeyEvent.KEYCODE_BACK && ::webView.isInitialized && webView.canGoBack()) {
                      webView.goBack()
                      return true
                  }
                  return super.onKeyDown(keyCode, event)
              }
          }
          EOF

          cp index.html app/src/main/assets/index.html

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LyricSyncher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

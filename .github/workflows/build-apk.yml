name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Android project files
        run: |
          # 1. Crea la struttura delle cartelle necessaria
          mkdir -p app/src/main/java/com/lyricsyncher/app app/src/main/res/values app/src/main/res/layout app/src/main/assets

          # 2. Crea i file di configurazione radice
          cat <<'EOF' > settings.gradle.kts
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "LyricSyncher"
          include(":app")
          EOF

          cat <<'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          # 3. Crea il build.gradle.kts specifico per il modulo :app
          cat <<'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.lyricsyncher.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.lyricsyncher.app"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          EOF

          # 4. Crea un file AndroidManifest.xml minimo se non esiste, altrimenti fallisce
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="LyricSyncher"
                  android:theme="@android:style/Theme.Material.Light">
              </application>
          </manifest>
          EOF

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricSyncher-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          

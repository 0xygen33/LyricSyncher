name: Build Android APK from HTML

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Generate Android project files
        run: |
          # 1. Crea la struttura delle cartelle (inclusa assets per l'HTML)
          mkdir -p app/src/main/java/com/lyricsyncher/app app/src/main/res/values app/src/main/res/layout app/src/main/assets

          # 2. Copia i tuoi file HTML/CSS/JS della repo dentro la cartella assets dell'app
          # Assumendo che il tuo file principale si chiami index.html nella radice della repo
          cp -r * app/src/main/assets/ 2>/dev/null || true

          # 3. Crea i file di configurazione radice
          cat <<'EOF' > settings.gradle.kts
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "LyricSyncher"
          include(":app")
          EOF

          cat <<'EOF' > build.gradle.kts
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          # 4. Crea il build.gradle.kts del modulo app
          cat <<'EOF' > app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.lyricsyncher.app"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.lyricsyncher.app"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              buildTypes {
                  release { isMinifyEnabled = false }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          EOF

          # 5. Crea il layout con la WebView a schermo intero
          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <WebView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/webView"
              android:layout_width="match_parent"
              android:layout_height="match_parent" />
          EOF

          # 6. Crea il codice Java/Kotlin per l'Activity principale che apre l'HTML
          cat <<'EOF' > app/src/main/java/com/lyricsyncher/app/MainActivity.kt
          package com.lyricsyncher.app

          import android.os.Bundle
          import android.webkit.WebView
          import android.webkit.WebViewClient
          import androidx.appcompat.app.AppCompatActivity

          class MainActivity : AppCompatActivity() {
              override : void onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  
                  val webView = findViewById<WebView>(R.id.webView)
                  webView.webViewClient = WebViewClient()
                  webView.settings.javaScriptEnabled = true
                  webView.settings.domStorageEnabled = true
                  
                  // Carica il file index.html dalla cartella assets
                  webView.loadUrl("file:///android_asset/index.html")
              }
          }
          EOF

          # 7. Crea il file AndroidManifest.xml corretto con l'Activity di avvio e l'icona di default
          cat <<'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="LyricSyncher"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </
          
